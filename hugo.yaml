baseURL: https://denhafiz.my/
locale: en-us
title: Den Hafiz's Website
theme: mana
publishDir: public

params:
    # Set this to a folder that doesn't exist to "empty" the list
    # mainSections: ["nothing"]
    favicon: "/favicon.ico"
    enableIntegrity: false
    relatedPostsCount: 1
    description: A website where I show off my projects, and some rants that no one wanted to hear
    author: Den Hafiz
    heroTitleLine1: Den Hafiz's 
    heroTitleLine2: Website
    footerText: Built with Hugo and Mana theme

    social:
      github: https://github.com/DenHafiz69
      linkedin: https://www.linkedin.com/in/denhafiz69
      email: den.m.hafiz@gmail.com

    avatar:
      home:
        assetPath: "/images/avatar.png"

    search: 
      enabled: true
  
  # If you want to customize what is searchable
  # (Matches the logic in the index.json we fixed earlier)
    mainSections: ["blog", "projects"]

    copyright:
      startYear: 2026
      owner: Den Hafiz

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - name: Home
      url: /
      weight: 10
    - name: Projects
      url: /projects/
      weight: 20
    - name: Blog
      url: /blog/
      weight: 30
    - name: About Me
      url: /about/
      weight: 40
    - name: Contact
      url: /contact/
      weight: 50

